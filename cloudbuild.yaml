substitutions:
  _REGION: asia-northeast1
  _SERVICE_NAME: who-did-it
  _AR_REPO: who-did-it
  _OPENAI_API_KEY_SECRET_NAME: OPENAI_API_KEY
  _OPENAI_API_KEY_SECRET_VERSION: latest

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - id: Build image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${SHORT_SHA}
      - .

  - id: Push image
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${SHORT_SHA}

  - id: Deploy to Cloud Run
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${SHORT_SHA}
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --set-env-vars
      - GCP_PROJECT_ID=${PROJECT_ID},OPENAI_API_KEY_SECRET_NAME=${_OPENAI_API_KEY_SECRET_NAME},OPENAI_API_KEY_SECRET_VERSION=${_OPENAI_API_KEY_SECRET_VERSION}

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${SHORT_SHA}
